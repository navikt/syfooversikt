version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
      time: "07:00"
    cooldown:
      default-days: 3
    open-pull-requests-limit: 10

  - package-ecosystem: npm  # also handles pnpm via pnpm-lock.yaml
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: 'nav-frontend*'
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
